<!DOCTYPE html>
<html>
<head>
  <title>Akash Bot Panel</title>
  <link rel="stylesheet" href="/admin.css" />
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <div class="sidebar-header">Akash Bot</div>
      <div id="chats"></div>
    </div>

    <div class="main">
      <div class="topbar" id="chatTitle">Select a chat</div>

      <div class="messages" id="messages">
        <div class="empty">No chat selected</div>
      </div>

      <div id="replyBox" class="reply-box hidden">
        <span id="replyText"></span>
        <button onclick="clearReply()">×</button>
      </div>

      <div class="input-bar">
        <input id="text" placeholder="Type as Akash bot..." onkeydown="handleEnter(event)" />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script src="/admin.js"></script>
</body>
</html>
